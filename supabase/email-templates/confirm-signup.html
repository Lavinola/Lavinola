<!--
  Plantilla para: Supabase → Authentication → Email Templates → "Confirm signup"
  (es la que se dispara cuando alguien se registra y hay que confirmar el mail).

  Cómo instalarla:
  1. Andá al panel de Supabase de tu proyecto.
  2. Authentication → Email Templates → elegí "Confirm signup".
  3. Borrá el contenido que hay y pegá TODO este archivo en el campo "Message body (HTML)".
  4. Guardá. Los envíos siguientes ya van a usar este diseño.

  No hace falta tocar nada de las variables {{ .ConfirmationURL }} — Supabase las
  reemplaza solas por el link real de cada usuario.
-->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmá tu cuenta</title>
  </head>
  <body style="margin:0; padding:0; background-color:#0A0A0A; font-family: Georgia, 'Times New Roman', serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0A0A0A; padding: 40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" style="max-width: 480px; background-color:#141014; border-radius: 20px; overflow:hidden; border: 1px solid rgba(166,63,224,0.35);">

            <!-- Encabezado con la marca -->
            <tr>
              <td align="center" style="padding: 40px 32px 24px 32px;">
                <div style="display:inline-block; width:56px; height:56px; border-radius:16px; background: linear-gradient(135deg, #A63FE0, #6D257E); text-align:center; line-height:56px; margin-bottom: 18px;">
                  <span style="font-size:28px; color:#000000;">✓</span>
                </div>
                <div style="font-family: Georgia, 'Times New Roman', serif; font-size: 30px; font-weight:700; letter-spacing: 3px; color:#C77DF2; text-transform:uppercase;">
                  Lavinola
                </div>
                <div style="font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 3px; color:#9A9A9A; margin-top: 2px; text-transform:uppercase;">
                  Cine &amp; Series
                </div>
              </td>
            </tr>

            <!-- Separador -->
            <tr>
              <td style="padding: 0 32px;">
                <div style="height:1px; background: linear-gradient(to right, transparent, rgba(166,63,224,0.5), transparent);"></div>
              </td>
            </tr>

            <!-- Cuerpo -->
            <tr>
              <td align="center" style="padding: 32px 32px 8px 32px; font-family: Arial, sans-serif;">
                <div style="font-size: 20px; font-weight:700; color:#FFFFFF; margin-bottom: 12px;">
                  ¡Ya casi estás!
                </div>
                <div style="font-size: 14px; line-height: 22px; color:#C9C9C9; margin-bottom: 28px;">
                  Confirmá tu cuenta para empezar a trackear tus series y películas,
                  descubrir contenido nuevo y compartirlo con la comunidad.
                </div>
              </td>
            </tr>

            <!-- Botón -->
            <tr>
              <td align="center" style="padding: 0 32px 36px 32px;">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="
                    display:inline-block;
                    background-color:#A63FE0;
                    color:#000000;
                    font-family: Arial, sans-serif;
                    font-size: 15px;
                    font-weight: 800;
                    letter-spacing: 0.5px;
                    text-decoration:none;
                    padding: 16px 40px;
                    border-radius: 14px;
                  "
                >
                  CONFIRMAR MI CUENTA
                </a>
              </td>
            </tr>

            <!-- Nota chica -->
            <tr>
              <td align="center" style="padding: 0 32px 40px 32px; font-family: Arial, sans-serif;">
                <div style="font-size: 12px; line-height: 18px; color:#7A7A7A;">
                  Si no creaste esta cuenta, podés ignorar este mensaje tranquilo.
                </div>
              </td>
            </tr>

            <!-- Pie -->
            <tr>
              <td style="padding: 20px 32px; background-color:#0A0A0A; border-top: 1px solid rgba(255,255,255,0.06);" align="center">
                <div style="font-family: Arial, sans-serif; font-size: 11px; color:#5A5A5A;">
                  Lavinola: Cine &amp; Series 🎬
                </div>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
